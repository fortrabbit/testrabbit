services:
    php83:
        build:
            dockerfile: docker/Dockerfile
            args:
                PHP_VERSION: '8.3'
        ports:
            - '8083:8000'

    php84:
        build:
            dockerfile: docker/Dockerfile
            args:
                PHP_VERSION: '8.4'
        ports:
            - '8084:8000'

    php85:
        build:
            dockerfile: docker/Dockerfile
            args:
                PHP_VERSION: '8.5'
        ports:
            - '8085:8000'

    mysql:
        image: docker.io/mysql:8.0
        ports:
            - "33066:3306"
        environment:
            - MYSQL_ROOT_PASSWORD=pwd
            - MYSQL_DATABASE=testrabbit
        volumes:
            - mysql-data:/var/lib/mysql

    memcache:
        image: docker.io/memcached:1.6-alpine
        ports:
            - "11211:11211"
        command: memcached -m 64 -I 1m

volumes:
    mysql-data:
